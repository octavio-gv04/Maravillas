<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1d4ed8" />
  <title>Admin Financiera</title>

  <!-- TailwindCSS via CDN (sin compilacion). Compatible con Safari/Chrome/Firefox/Edge. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Configuracion Tailwind: habilita modo oscuro por clase y paleta de marca.
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#1d4ed8', dark: '#1e40af' },
          },
          fontFamily: {
            // San Francisco en Apple, Roboto/sistema en el resto.
            sans: ['-apple-system', 'BlinkMacSystemFont', 'Roboto', 'Segoe UI', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- Chart.js para gráficas (CDN, compatible con Safari). -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-100 font-sans antialiased">

  <!-- ====================== PANTALLA DE LOGIN ====================== -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center p-4 hidden"></div>

  <!-- ====================== APLICACION ====================== -->
  <div id="app-shell" class="hidden min-h-screen">

    <!-- Sidebar -->
    <aside id="sidebar"
      class="fixed inset-y-0 left-0 z-40 w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 transform -translate-x-full md:translate-x-0 transition-transform duration-200 flex flex-col">
      <div class="h-16 flex items-center gap-2 px-5 border-b border-gray-200 dark:border-gray-700">
        <span id="brand-icon" class="text-2xl">💰</span>
        <span id="brand-name" class="font-bold text-lg">Admin Financiera</span>
      </div>
      <nav id="nav-menu" class="flex-1 overflow-y-auto p-3 space-y-1 text-sm"></nav>
      <div class="p-3 border-t border-gray-200 dark:border-gray-700 text-xs text-gray-500 space-y-1">
        <div id="nav-user" class="mb-2"></div>
        <button id="switch-ws" class="w-full flex items-center gap-2 text-left px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
          🔁 Cambiar sistema
        </button>
        <button id="logout-btn" class="w-full flex items-center gap-2 text-left px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
          🚪 Cerrar sesión
        </button>
      </div>
    </aside>

    <!-- Overlay para cerrar sidebar en mobile -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-30 hidden md:hidden"></div>

    <!-- Contenido principal -->
    <div class="md:ml-64 flex flex-col min-h-screen">
      <!-- Topbar -->
      <header class="h-16 sticky top-0 z-20 bg-white/90 dark:bg-gray-800/90 backdrop-blur border-b border-gray-200 dark:border-gray-700 flex items-center gap-3 px-4">
        <button id="sidebar-toggle" class="md:hidden text-2xl" aria-label="Menú">☰</button>
        <h1 id="page-title" class="font-semibold text-lg flex-1">Dashboard</h1>
        <span id="conn-status" class="text-xs text-gray-500 hidden sm:flex items-center gap-1.5"></span>
        <span id="today-label" class="text-sm text-gray-500 hidden md:block"></span>
        <button id="theme-toggle" class="text-xl px-2 py-1 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700" aria-label="Tema">🌙</button>
      </header>

      <!-- Vista activa (renderizada por el router) -->
      <main id="view" class="flex-1 p-4 md:p-6 max-w-7xl w-full mx-auto"></main>
    </div>
  </div>

  <!-- Contenedor de notificaciones (toasts) -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

  <!-- Punto de entrada (ES Modules, sin bundler) -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
